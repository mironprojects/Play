<!DOCTYPE html>
<!-- Ready for GitHub Pages: upload this file as index.html to your repository -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ШКМ — Собери компьютер (Fixed v2)</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

#game {
  position: relative;
  width: 320px;
  height: 480px;
  margin: 20px auto;
  background: #222;
  border: 3px solid #555;
  overflow: hidden;
}

#player {
  position: absolute;
  bottom: 10px;
  left: 170px;
  width: 60px;
  height: 60px;
  background: cyan;
  text-align: center;
  line-height: 60px;
  font-weight: bold;
}

.item {
  position: absolute;
  width: 60px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}

.pc {
  width: 50px;
  height: 70px;
  background: #1a1a1a;
  border-radius: 6px;
  border: 2px solid #444;
  position: relative;
}

.fan {
  position: absolute;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  top: 8px;
  left: 10px;
  background: conic-gradient(#00ffff, #0066ff, #00ffff);
  animation: spin 1s linear infinite;
}

.fan2 {
  position: absolute;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  bottom: 8px;
  left: 10px;
  background: conic-gradient(#00ff99, #00ccff, #00ff99);
  animation: spin 1s linear infinite;
}

.mouse {
  width: 40px;
  height: 65px;
  background: #111;
  border-radius: 20px 20px 30px 30px;
  border: 2px solid #444;
  position: relative;
}

.wheel {
  position: absolute;
  width: 6px;
  height: 14px;
  background: #00ffcc;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 3px;
}

.rgb {
  position: absolute;
  width: 100%;
  height: 6px;
  bottom: -2px;
  left: 0;
  border-radius: 0 0 20px 20px;
  background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet);
  animation: glow 2s linear infinite;
}

.keyboard {
  width: 70px;
  height: 40px;
  background: #111;
  border: 2px solid #444;
  border-radius: 6px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-gap: 2px;
  padding: 3px;
}

.key {
  background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet);
  animation: glow 2s linear infinite;
  border-radius: 2px;
}

.laptop {
  width: 70px;
  height: 50px;
  position: relative;
}

.screen {
  width: 70px;
  height: 32px;
  background: radial-gradient(circle at center, #00ccff, #001a33);
  border: 2px solid #444;
  border-radius: 5px 5px 0 0;
}

.base {
  width: 70px;
  height: 14px;
  background: #111;
  border: 2px solid #444;
  border-top: none;
  border-radius: 0 0 8px 8px;
  position: relative;
}

.base::before {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet);
  animation: glow 2s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes glow {
  from { filter: hue-rotate(0deg); }
  to { filter: hue-rotate(360deg); }
}
</style>
</head>

<body>

<h2>🖥️ ШКМ — Собери компьютер</h2>
<p>Очки: <span id="score">0</span> | 🪙 Монеты: <span id="coins">0</span> | ❤️ Жизни: <span id="lives">3</span></p>

<div id="menu" style="position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; background:rgba(0,0,0,0.8); z-index:10;">
  <h1>🖥️ ШКМ</h1>
  <button onclick="startGame()" style="font-size:20px; padding:10px 20px; margin:5px;">▶ Play</button>
  <button onclick="openShop()" style="font-size:18px; padding:8px 18px; margin:5px;">🛒 Shop</button>
</div>

<div id="shop" style="position:absolute; top:0; left:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; flex-direction:column; background:rgba(0,0,0,0.9); z-index:11; color:white;">
  <h2>🛒 Shop</h2>
  <button onclick="buySpeed()" style="margin:5px; padding:8px 14px;">⚡ Speed Upgrade (cost 10)</button>
  <button onclick="buyMultiplier()" style="margin:5px; padding:8px 14px;">⭐ Score x2 (cost 15)</button>
  <button onclick="closeShop()" style="margin:10px; padding:6px 12px;">⬅ Back</button>
</div>

<div id="game">
  <div id="player">ШКМ</div>
  <button id="leaveBtn" onclick="leaveGame()" style="position:absolute; top:5px; right:5px; padding:5px 10px; font-size:14px; display:none;">Leave</button>
</div>

<script>
// ===== DOM =====
let menu = document.getElementById("menu");
let leaveBtn = document.getElementById("leaveBtn");
let player = document.getElementById("player");
let scoreEl = document.getElementById("score");
let coinsEl = document.getElementById("coins");
let livesEl = document.getElementById("lives");

// ===== GAME STATE =====
let playerSpeed = 20;
let scoreMultiplier = 1;
let gameInterval;

let playerX = 170;
let score = 0;
let lives = 3;
let coins = 0;
let maxLives = 5;

// initialize UI safely
livesEl.textContent = lives;
coinsEl.textContent = coins;
scoreEl.textContent = score;

function changeLives(amount) {
  lives += amount;

  if (lives > maxLives) lives = maxLives;
  if (lives < 0) lives = 0;

  livesEl.textContent = lives;

  // handled in changeLives()
}

// ===== MOVEMENT =====
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft") playerX -= playerSpeed;
  if (e.key === "ArrowRight") playerX += playerSpeed;

  if (playerX < 0) playerX = 0;
  if (playerX > 260) playerX = 260;

  player.style.left = playerX + "px";
});

// ===== ITEMS =====
let maxItems = 8; // limit items on screen to reduce lag

let items = [
  {type: "heart"},
  {type: "bomb"},
  {type: "laptop"},
  {type: "keyboard"},
  {type: "mouse"},
  {type: "pc"},
  {type: "virus"}
];

function createItem() {
  // prevent too many items (lag fix)
  if (document.querySelectorAll(".item").length >= maxItems) return;
  let game = document.getElementById("game");
  let item = document.createElement("div");
  item.className = "item";

  let random = items[Math.floor(Math.random() * items.length)];
  item.dataset.type = random.type;

  if (random.type === "pc") {
    let pc = document.createElement("div");
    pc.className = "pc";

    let fan1 = document.createElement("div");
    fan1.className = "fan";

    let fan2 = document.createElement("div");
    fan2.className = "fan2";

    pc.appendChild(fan1);
    pc.appendChild(fan2);
    item.appendChild(pc);
  }
  else if (random.type === "mouse") {
    let mouse = document.createElement("div");
    mouse.className = "mouse";

    let wheel = document.createElement("div");
    wheel.className = "wheel";

    let rgb = document.createElement("div");
    rgb.className = "rgb";

    mouse.appendChild(wheel);
    mouse.appendChild(rgb);
    item.appendChild(mouse);
  }
  else if (random.type === "keyboard") {
    let keyboard = document.createElement("div");
    keyboard.className = "keyboard";

    for (let i = 0; i < 15; i++) {
      let key = document.createElement("div");
      key.className = "key";
      keyboard.appendChild(key);
    }

    item.appendChild(keyboard);
  }
  else if (random.type === "laptop") {
    let laptop = document.createElement("div");
    laptop.className = "laptop";

    let screen = document.createElement("div");
    screen.className = "screen";

    let base = document.createElement("div");
    base.className = "base";

    laptop.appendChild(screen);
    laptop.appendChild(base);
    item.appendChild(laptop);
  }
  else if (random.type === "virus") {
    item.textContent = "🦠";
  }
  else if (random.type === "heart") {
    item.textContent = "❤️";
  }
  else if (random.type === "bomb") {
    item.textContent = "💣";
  }

  item.style.left = Math.random() * 260 + "px";
  item.style.top = "0px";

  game.appendChild(item);

  let fall = setInterval(function() {
    let top = parseInt(item.style.top);
    item.style.top = top + 5 + "px";

    let itemX = item.offsetLeft;
    let itemY = item.offsetTop;

    if (
      itemY > 400 &&
      itemX > playerX - 40 &&
      itemX < playerX + 60
    ) {
      if (item.dataset.type === "pc") {
        score += 3 * scoreMultiplier;
      } else if (item.dataset.type === "virus") {
        score--;
      } else if (item.dataset.type === "bomb") {
        changeLives(-1);
      } else if (item.dataset.type === "heart") {
        changeLives(1);
      } else {
        score += 1 * scoreMultiplier;
      }

      if (score < 0) score = 0;

      if (lives <= 0) {
        clearInterval(gameInterval);
        alert("Game Over! 💀");
        menu.style.display = "flex";
        leaveBtn.style.display = "none";
      }

      scoreEl.textContent = score;
      item.remove();
      clearInterval(fall);
    }

    if (itemY > 480) {
      item.remove();
      clearInterval(fall);
    }
  }, 50);
}

// ===== SHOP =====
function openShop() {
  menu.style.display = "none";
  document.getElementById("shop").style.display = "flex";
}

function closeShop() {
  document.getElementById("shop").style.display = "none";
  menu.style.display = "flex";
}

function buySpeed() {
  if (score >= 10) {
    score -= 10;
    playerSpeed += 5;
    scoreEl.textContent = score;
    alert("Speed upgraded! ⚡");
  } else {
    alert("Not enough score!");
  }
}

function buyMultiplier() {
  if (score >= 15) {
    score -= 15;
    scoreMultiplier = 2;
    scoreEl.textContent = score;
    alert("Score x2 activated! ⭐");
  } else {
    alert("Not enough score!");
  }
}

// ===== GAME CONTROL =====
function startGame() {
  menu.style.display = "none";
  leaveBtn.style.display = "block";
  gameInterval = setInterval(createItem, 1200);
}

function leaveGame() {
  clearInterval(gameInterval);

  let itemsOnScreen = document.querySelectorAll(".item");
  itemsOnScreen.forEach(el => el.remove());

  // convert points to coins (1 point = 0.5 coin)
  coins += Math.floor(score * 0.5);
  coinsEl.textContent = coins;

  score = 0;
  lives = 3;

  scoreEl.textContent = score;
  livesEl.textContent = lives;

  menu.style.display = "flex";
  leaveBtn.style.display = "none";
}

// ===== BASIC TESTS =====
console.assert(lives === 3, "Test failed: lives should start at 3");
console.assert(typeof createItem === "function", "Test failed: createItem should exist");
</script>

</body>
</html>
